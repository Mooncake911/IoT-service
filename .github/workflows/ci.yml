name: CI

on:
  push:
    branches: [ "master", "main" ]
    paths-ignore:
      - "**/*.md"
      - ".idea/**"
      - "infra/**"
      - "monitoring/**"
      - "elk/**"
      - "scripts/**"
  pull_request:
    branches: [ "master", "main" ]
    paths-ignore:
      - "**/*.md"
      - ".idea/**"
      - "infra/**"
      - "monitoring/**"
      - "elk/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      has_images: ${{ steps.filter.outputs.has_images }}
      image_matrix: ${{ steps.filter.outputs.image_matrix }}
      has_retags: ${{ steps.filter.outputs.has_retags }}
      retag_matrix: ${{ steps.filter.outputs.retag_matrix }}
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect affected areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            all=true
            : > changed-files.txt
          else
            all=false
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
                base="$(git rev-list --max-parents=0 "$head")"
              fi
            fi
            git diff --name-only "$base" "$head" > changed-files.txt
          fi

          changed() {
            grep -Eq "$1" changed-files.txt
          }

          ci=false
          server=false
          client=false
          should_deploy=false
          server_all=false
          dashboard_image=false
          iot_controller=false
          iot_analytics=false
          iot_alerts=false
          iot_data_gateway=false
          iot_data_simulator=false

          if [ "$all" = true ] || changed '^\.github/workflows/ci\.yml$'; then
            ci=true
          fi

          if [ "$all" = true ] || changed '^(\.mvn/|mvnw|mvnw\.cmd|pom\.xml$|Dockerfile$|\.dockerignore$|iot-contracts/|iot-controller/|iot-analytics/|iot-alerts/|iot-data-gateway/|iot-data-simulator/|iot-dashboard/)'; then
            should_deploy=true
          fi

          if [ "$ci" = true ] || changed '^(\.mvn/|mvnw|mvnw\.cmd|pom\.xml$|iot-contracts/)'; then
            server=true
            server_all=true
          fi

          if [ "$ci" = true ] || changed '^(Dockerfile|\.dockerignore)$'; then
            server_all=true
          fi

          if [ "$ci" = true ] || changed '^iot-controller/'; then
            server=true
            iot_controller=true
          fi
          if [ "$ci" = true ] || changed '^iot-analytics/'; then
            server=true
            iot_analytics=true
          fi
          if [ "$ci" = true ] || changed '^iot-alerts/'; then
            server=true
            iot_alerts=true
          fi
          if [ "$ci" = true ] || changed '^iot-data-gateway/'; then
            server=true
            iot_data_gateway=true
          fi
          if [ "$ci" = true ] || changed '^iot-data-simulator/'; then
            server=true
            iot_data_simulator=true
          fi

          if [ "$ci" = true ] || changed '^iot-dashboard(/|$)'; then
            client=true
            dashboard_image=true
          fi

          export server client server_all dashboard_image
          export iot_controller iot_analytics iot_alerts iot_data_gateway iot_data_simulator

          python3 - <<'PY'
          import json
          import os

          server_services = [
              ("iot-controller", ".", "./Dockerfile", "iot-controller"),
              ("iot-analytics", ".", "./Dockerfile", "iot-analytics"),
              ("iot-alerts", ".", "./Dockerfile", "iot-alerts"),
              ("iot-data-gateway", ".", "./Dockerfile", "iot-data-gateway"),
              ("iot-data-simulator", ".", "./Dockerfile", "iot-data-simulator"),
          ]

          service_flags = {
              "iot-controller": "iot_controller",
              "iot-analytics": "iot_analytics",
              "iot-alerts": "iot_alerts",
              "iot-data-gateway": "iot_data_gateway",
              "iot-data-simulator": "iot_data_simulator",
          }

          include = []
          if os.environ["server_all"] == "true":
              selected = [name for name, *_ in server_services]
          else:
              selected = [
                  name for name, *_ in server_services
                  if os.environ[service_flags[name]] == "true"
              ]

          for name, context, dockerfile, target in server_services:
              if name in selected:
                  include.append({
                      "service": name,
                      "context": context,
                      "dockerfile": dockerfile,
                      "target": target,
                  })

          if os.environ["dashboard_image"] == "true":
              include.append({
                  "service": "iot-dashboard-ui",
                  "context": "./iot-dashboard",
                  "dockerfile": "./iot-dashboard/Dockerfile",
                  "target": "dashboard-ui",
              })

          all_services = [name for name, *_ in server_services] + ["iot-dashboard-ui"]
          selected_services = {item["service"] for item in include}
          retag_include = [
              {"service": name}
              for name in all_services
              if selected_services and name not in selected_services
          ]

          with open("image-matrix.json", "w", encoding="utf-8") as fh:
              json.dump({"include": include}, fh, separators=(",", ":"))
          with open("retag-matrix.json", "w", encoding="utf-8") as fh:
              json.dump({"include": retag_include}, fh, separators=(",", ":"))
          PY

          image_matrix="$(cat image-matrix.json)"
          retag_matrix="$(cat retag-matrix.json)"

          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "client=$client" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          if [ "$image_matrix" = '{"include":[]}' ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          fi
          echo "image_matrix=$image_matrix" >> "$GITHUB_OUTPUT"
          if [ "$retag_matrix" = '{"include":[]}' ]; then
            echo "has_retags=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_retags=true" >> "$GITHUB_OUTPUT"
          fi
          echo "retag_matrix=$retag_matrix" >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          sed 's/^/  /' changed-files.txt || true
          echo "Image matrix: $image_matrix"
          echo "Retag matrix: $retag_matrix"
          echo "should_deploy=$should_deploy" > deploy.env

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v6
        with:
          name: ci-deploy-metadata
          path: deploy.env
          retention-days: 1

  # ========================================================================
  #  BUILD JOBS (without tests)
  # ========================================================================

  build-server:
    name: Build Server (Maven)
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Package (skip tests)
        run: ./mvnw -B -DskipTests package

  build-client:
    name: Build Client (Dashboard)
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iot-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: iot-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static files
        run: npm run build

  # ========================================================================
  #  TEST JOBS (depend on build)
  # ========================================================================

  test-server:
    name: Test Server
    needs: build-server
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

  test-client:
    name: Test Client
    needs: build-client
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iot-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: iot-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm test --if-present

  # ========================================================================
  #  DOCKER BUILD & PUSH (depends on all build & test jobs)
  # ========================================================================

  build-and-push:
    name: Build & Push Images
    needs:
      - changes
      - build-server
      - test-server
      - build-client
      - test-client
    if: ${{ always() && needs.changes.outputs.has_images == 'true' && needs.build-server.result == 'success' && needs.test-server.result == 'success' && needs.build-client.result == 'success' && needs.test-client.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.image_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercased repo owner env
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/iot-service/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/iot-service/${{ matrix.service }}:latest

  # ========================================================================
  #  RETAG UNCHANGED IMAGES (if needed)
  # ========================================================================

  tag-unchanged-images:
    name: Tag Unchanged Images
    needs:
      - changes
      - build-and-push
    if: ${{ always() && github.event_name == 'push' && needs.changes.outputs.has_retags == 'true' && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.retag_matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercased repo owner env
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Tag unchanged image with current commit SHA
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/iot-service/${{ matrix.service }}:${{ github.sha }} \
            ghcr.io/${{ env.OWNER_LC }}/iot-service/${{ matrix.service }}:latest