- name: Install Docker
  hosts: iot_vm
  become: true
  gather_facts: true

  vars:
    docker_user: "ubuntu"
    docker_version: ""

  tasks:
    # ========================================================================
    # 1. INSTALL PREREQUISITES
    # ========================================================================
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    # ========================================================================
    # 2. ADD DOCKER REPOSITORY
    # ========================================================================
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Add Docker repository
      ansible.builtin.deb822_repository:
        filename: docker
        repository: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/docker.asc
        state: present

    # ========================================================================
    # 3. INSTALL DOCKER ENGINE
    # ========================================================================
    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    # ========================================================================
    # 4. START AND ENABLE DOCKER SERVICE
    # ========================================================================
    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # ========================================================================
    # 5. VERIFY DOCKER INSTALLATION
    # ========================================================================
    - name: Verify Docker installation
      ansible.builtin.shell:
        cmd: docker --version && docker compose version
      register: docker_version_check
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version_check.stdout_lines }}"

    # ========================================================================
    # 6. CONFIGURE USER PERMISSIONS
    # ========================================================================
    - name: Verify docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true
      register: user_updated

    - name: Warn about group membership
      ansible.builtin.debug:
        msg: |
          User {{ docker_user }} has been added to the docker group.
          Changes will take effect after the user logs out and back in.
      when: user_updated.changed

    # ========================================================================
    # 7. CONFIGURE DOCKER REGISTRY MIRRORS (for stable access)
    # ========================================================================
    - name: Configure Docker registry mirrors
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "registry-mirrors": [
              "https://cr.yandex/mirror",
              "https://mirror.gcr.io"
            ]
          }
        owner: root
        group: root
        mode: '0644'
      notify: restart docker

    # ========================================================================
    # 8. POST-INSTALLATION CHECKS
    # ========================================================================
    - name: Check if Docker can run without sudo
      ansible.builtin.shell:
        cmd: docker ps
      become_user: "{{ docker_user }}"
      register: docker_ps_test
      changed_when: false
      ignore_errors: true

    - name: Warn if Docker requires sudo
      ansible.builtin.debug:
        msg: "⚠️ User {{ docker_user }} may need to log out and back in to use Docker without sudo"
      when: docker_ps_test.rc != 0

  handlers:
    - name: restart docker
      ansible.builtin.service:
        name: docker
        state: restarted
        daemon_reload: yes