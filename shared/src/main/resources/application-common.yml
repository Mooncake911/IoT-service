server:
  port: ${SPRING_SERVER_PORT:8080}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 25s
  rabbitmq:
    x-queue-mode: lazy
    port: ${RABBIT_MQ_PORT:5672}
    host: ${RABBIT_HOST:localhost}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

app:
  rabbitmq:
    chunk-size: ${APP_BATCH_SIZE:500}
    exchange:
      data: iot.data.exchange
      analytics: analytics.exchange
      alerts: alerts.exchange
