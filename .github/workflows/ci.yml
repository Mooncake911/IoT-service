name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  server-build:
    name: Server Build (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Build server modules
        run: ./mvnw -B -ntp clean package -DskipTests

  server-test:
    name: Server Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Run server tests
        run: ./mvnw -B -ntp test

  client-build:
    name: Client Build (Dashboard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iot-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: iot-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard package
        run: npm run build

  client-test:
    name: Client Test (Dashboard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iot-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: iot-dashboard/package-lock.json

      - name: Install dashboard dependencies (with dev)
        run: npm ci

      - name: Run dashboard tests
        run: npm run test --if-present
